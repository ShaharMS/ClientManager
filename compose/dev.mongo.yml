# Single-node MongoDB replica set for local integration tests and multipod stacks.
# Transactions (atomic token buckets) require a replica set even with one member.
#
# Usage:
#   docker compose -f compose/dev.mongo.yml up -d
#
# Connection string:
#   mongodb://localhost:27017/?replicaSet=rs0

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-rs-data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}).ok }",
        ]
      interval: 3s
      timeout: 10s
      retries: 30
      start_period: 5s

volumes:
  mongo-rs-data:
