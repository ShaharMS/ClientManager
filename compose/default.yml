services:
  api:
    image: clientmanager/api:local
    build:
      context: ..
      dockerfile: ClientManager.Api/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "5062:5062"

  adminui:
    image: clientmanager/adminui:local
    build:
      context: ..
      dockerfile: ClientManager.AdminUI/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ApiBaseUrl: http://api:5062
    ports:
      - "5100:5100"
