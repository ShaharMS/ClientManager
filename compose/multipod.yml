# Three API replicas sharing MongoDB + Redis (production-like persistence).
# Enable via docker-compose.yml: include only compose/multipod.yml

x-api-environment: &api-environment
  ASPNETCORE_ENVIRONMENT: Development
  Persistence__DefaultProvider: MongoDb
  Persistence__DefaultMongoDb__ConnectionString: mongodb://mongo:27017/?replicaSet=rs0
  Persistence__DefaultMongoDb__DatabaseName: ClientManager
  Persistence__Roles__RateLimiting__Provider: Redis
  Persistence__Roles__RateLimiting__Redis__Host: redis
  Persistence__Roles__RateLimiting__Redis__Port: "6379"
  Persistence__Roles__RateLimiting__Redis__DatabaseIndex: "1"
  Persistence__Roles__Rpm__Provider: Redis
  Persistence__Roles__Rpm__Redis__Host: redis
  Persistence__Roles__Rpm__Redis__Port: "6379"
  Persistence__Roles__Rpm__Redis__DatabaseIndex: "2"

x-api-service: &api-service
  image: clientmanager/api:local
  restart: unless-stopped
  environment:
    <<: *api-environment
  depends_on:
    mongo:
      condition: service_healthy
    redis:
      condition: service_started

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}).ok }",
        ]
      interval: 3s
      timeout: 10s
      retries: 30
      start_period: 5s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api-1:
    <<: *api-service
    build:
      context: ..
      dockerfile: ClientManager.Api/Dockerfile
    ports:
      - "5062:5062"

  api-2:
    <<: *api-service
    depends_on:
      api-1:
        condition: service_started
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "5063:5062"

  api-3:
    <<: *api-service
    depends_on:
      api-1:
        condition: service_started
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "5064:5062"

volumes:
  mongo-data:
  redis-data:
