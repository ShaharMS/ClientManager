name: Release bundles

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  bundles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build git bundles
        id: bundles
        run: |
          chmod +x .github/scripts/build-release-bundles.sh
          .github/scripts/build-release-bundles.sh "${{ github.event.release.tag_name }}"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            [[ -n "$file" ]] || continue
            gh release upload "${{ github.event.release.tag_name }}" "$file" --repo "${{ github.repository }}" --clobber
          done <<< "${{ steps.bundles.outputs.upload_files }}"
