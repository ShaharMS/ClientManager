global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: clientmanager-api
    metrics_path: /prometheus/otel
    static_configs:
      - targets:
          - api-1:5062
          - api-2:5062
          - api-3:5062
      # Single-api compose: uncomment api or host.docker.internal instead of api-1/2/3
      # - targets: [api:5062]
      # - targets: [host.docker.internal:5062]
