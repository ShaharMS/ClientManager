site_name: ClientManager
site_description: Guides for integrating ClientManager into your services and operating its persistence layer.

theme:
  name: material

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      use_pygments: false
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Configuration reference: configuration-reference.md
  - Admin UI guide: admin-ui-guide.md
  - Localization: localization.md
  - API overview: api-overview.md
  - Development and operations: development-and-operations.md
  - Kubernetes (airgapped):
    - Overview: kubernetes/index.md
    - Redis tuning: kubernetes/redis-tuning-airgapped.md
  - Scripts:
    - Overview: scripts/index.md
    - Multi-pod Docker: scripts/multipod-docker.md
    - seed_data.py: scripts/seed-data.md
    - traffic_generator.py: scripts/traffic-generator.md
    - performance_baseline.py: scripts/performance-baseline.md
    - launch_observability_ui.py: scripts/launch-observability-ui.md
    - download_images.py: scripts/download-images.md
  - Core concepts:
    - Architecture overview: core/architecture.md
    - Domain model: core/domain-model.md
    - Request flow: core/request-flow.md
    - Usage and observability: core/usage-and-observability.md
    - Seed system: core/seed-system.md
  - Integration guide: integration-guide.md
  - Observability:
    - Overview: observability/index.md
    - Local development: observability/local.md
    - On-prem stack: observability/on-prem-stack.md
    - Existing Grafana & Prometheus: observability/existing-monitoring.md
    - Pod discovery: observability/pod-discovery.md
  - Metrics catalog: metrics-catalog.md
  - Persistence:
    - Overview: persistence/index.md
    - MongoDB: persistence/mongodb.md
    - Redis: persistence/redis.md

extra_javascript:
  - javascripts/mermaid.min.js
  - javascripts/mermaid-init.js

extra_css:
  - stylesheets/mermaid-block.css
