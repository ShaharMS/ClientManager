# Entry point for `docker compose up`. Switch stacks by editing the include list.
#
# Single API + Admin UI (default):
include:
  - path: compose/default.yml

# Single API + Admin UI + Redis — comment default above, use both lines below:
# include:
#   - path: compose/default.yml
#   - path: compose/dev.redis.yml

# Multi-pod (3 APIs + MongoDB + Redis) — comment default above, use only:
# include:
#   - path: compose/multipod.yml
